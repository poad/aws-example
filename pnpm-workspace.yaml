packages:
  - ./**
  - '!**/.next'
  - '!**/cdk.out'
  - '!**/cdk.out/**'
  - '!**/dist'
  - '!**/build'

allowBuilds:
  '@apollo/protobufjs': false
  esbuild: false
  protobufjs: false
  sharp: false
  tldjs: false
  unrs-resolver: false

enablePrePostScripts: false

engineStrict: true

minimumReleaseAge: 10080 # 7 days in minutes
minimumReleaseAgeExclude:
  - '@aws-cdk/*'
  - 'aws-cdk@2.1121.0'

  - '@aws-sdk/*'
  - '@smithy/*'

  - '@rolldown/*'
  - 'rolldown@1.0.0'

  - 'vite@8.0.12'
  - '@vite/*'

  - '@strands-agents/sdk@1.0.0'
  - '@aws/aws-distro-opentelemetry-node-autoinstrumentation@0.11.0'
  - '@opentelemetry/*'

  - 'yaml@2.8.4'
  - ip-address@10.1.1
  - fast-xml-builder@1.1.7
  - fast-uri@3.1.2

  - 'jiti@2.7.0'

  - '@opentelemetry/*'

  - '@oxc-project/*'

  - 'hono@4.12.18'

  - 'next@16.2.6'
  - '@next/*'
  - '@opentelemetry/auto-instrumentations-node@0.75.0'
  - '@opentelemetry/sdk-node@0.217.0'
  - '@opentelemetry/exporter-prometheus@0.217.0'
  - protobufjs@8.0.2
  - ws@8.20.1

overrides:
  '@aws/aws-distro-opentelemetry-node-autoinstrumentation': '^0.11.0'
  '@opentelemetry/auto-instrumentations-node@<0.75.0': ^0.75.0
  '@opentelemetry/exporter-prometheus@<0.217.0': ^0.217.0
  '@opentelemetry/sdk-node@<0.217.0': ^0.217.0
  eslint-import-resolver-typescript: '^4.4.4'
  fast-uri@<=3.1.1: ^3.1.2
  fast-xml-builder@<=1.1.6: ^1.1.7
  fast-xml-parser@<5.7.0: '>=5.7.0'
  file-type@>=13.0.0 <21.3.1: '>=21.3.1'
  ip-address@<=10.1.0: ^10.1.1
  postcss@<8.5.10: '>=8.5.10'
  protobufjs@>=8.0.0 <=8.0.1: ^8.0.2
  semver: '>=7'
  uuid: '>=14.0.0'
  ws@>=8.0.0 <8.20.1: ^8.20.1

strictPeerDependencies: false

trustPolicy: no-downgrade
